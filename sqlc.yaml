version: "2"

sql:
  - engine: "postgresql"
    queries: "./db/queries"
    schema: "./db/migrations"
    gen:
      go:
        package: "db"
        sql_package: "pgx/v5"
        out: "./db/sqlc"
        emit_interface: true
        emit_json_tags: true
        emit_result_struct_pointers: true
        # overrides:
          # Add more overrides as needed
          # - column: "students.student_metadata"
          #   go_type: "json"
         
